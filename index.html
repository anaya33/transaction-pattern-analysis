<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Bakery Sales Visualization</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
    <style>
      /* Style to improve label readability */
      .axis text {
        font-size: 12px;
      }
      .bar {
        fill: #69b3a2;
      }
      .label {
        fill: black;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <svg
      style="width: 1200px; height: 400px; border: 1px solid lightgray"
    ></svg>

    <script>
      // Load the CSV file
      d3.csv("bakery_sales.csv", function (error, data) {
        if (error) {
          console.error("Error loading CSV file:", error);
          throw error;
        }

        // Convert the Quantity field to a number
        data.forEach(function (d) {
          d.Quantity = +d.Quantity;
        });

        // Optionally limit the number of items shown or sort by quantity
        data = data
          .sort(function (a, b) {
            return d3.descending(a.Quantity, b.Quantity);
          })
          .slice(0, 15); // Show top 15 items

        // Call the visualization function
        createVisualization(data);
      });

      function createVisualization(data) {
        var margin = { top: 20, right: 30, bottom: 100, left: 50 },
          width = 1200 - margin.left - margin.right, // Adjust width
          height = 400 - margin.top - margin.bottom;

        var svg = d3
          .select("svg")
          .attr("width", width + margin.left + margin.right)
          .attr("height", height + margin.top + margin.bottom)
          .append("g")
          .attr(
            "transform",
            "translate(" + margin.left + "," + margin.top + ")"
          );

        // X scale for article names (ordinal)
        var x = d3.scale
          .ordinal()
          .domain(
            data.map(function (d) {
              return d.article;
            })
          )
          .rangeRoundBands([0, width], 0.1); // Adjust padding

        // Y scale for quantities (linear)
        var y = d3.scale
          .linear()
          .domain([
            0,
            d3.max(data, function (d) {
              return d.Quantity;
            }),
          ])
          .range([height, 0]);

        // X axis
        var xAxis = d3.svg.axis().scale(x).orient("bottom");

        // Y axis
        var yAxis = d3.svg.axis().scale(y).orient("left");

        svg
          .append("g")
          .attr("class", "x axis")
          .attr("transform", "translate(0," + height + ")")
          .call(xAxis)
          .selectAll("text")
          .attr("transform", "rotate(-45)") // Rotate labels
          .style("text-anchor", "end")
          .style("font-size", "12px");

        svg.append("g").attr("class", "y axis").call(yAxis);

        // Bars
        svg
          .selectAll(".bar")
          .data(data)
          .enter()
          .append("rect")
          .attr("class", "bar")
          .attr("x", function (d) {
            return x(d.article);
          })
          .attr("width", x.rangeBand())
          .attr("y", function (d) {
            return y(d.Quantity);
          })
          .attr("height", function (d) {
            return height - y(d.Quantity);
          });

        // Labels for the bars
        svg
          .selectAll(".label")
          .data(data)
          .enter()
          .append("text")
          .attr("class", "label")
          .attr("x", function (d) {
            return x(d.article) + x.rangeBand() / 2;
          })
          .attr("y", function (d) {
            return y(d.Quantity) - 5;
          })
          .attr("dy", ".75em")
          .attr("text-anchor", "middle")
          .text(function (d) {
            return d.Quantity;
          });
      }
    </script>
  </body>
</html>
